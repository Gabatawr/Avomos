services:
  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./volumes/qdrant:/qdrant/storage

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - ./volumes/chat:/app/.cache/chat
    environment:
      - QDRANT_HOST=qdrant
      # ASPNETCORE_ENVIRONMENT, API keys → docker-compose.override.yml (gitignored)
    depends_on:
      - qdrant
