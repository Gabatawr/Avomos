services:
  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./volumes/qdrant:/qdrant/storage

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - ./volumes/chat:/app/.cache/chat
    environment:
      - QDRANT_HOST=qdrant
      #- OpenRouter__ApiKey=sk-or-v1-
      - OpenRouter__Endpoint=https://openrouter.ai/api/v1/
      - OpenRouter__Model=nvidia/llama-nemotron-embed-vl-1b-v2:free
      #- Llm__ApiKey=sk-
      - Llm__Endpoint=https://api.deepseek.com/v1/
      - Llm__ChatModelId=deepseek-v4-flash
    depends_on:
      - qdrant
